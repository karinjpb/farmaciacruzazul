<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ERP Farmacias Cruz Azul</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a365d 40%, #2b6cb0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35), 0 0 80px rgba(43, 108, 176, 0.15);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            font-size: 3.5em;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }

        .login-header h1 {
            color: #1a365d;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            color: #718096;
            font-size: 0.88em;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 7px;
            font-size: 0.82em;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-form input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95em;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
            background: #f7fafc;
        }

        .login-form input:focus {
            outline: none;
            border-color: #2b6cb0;
            background: white;
            box-shadow: 0 0 0 4px rgba(43, 108, 176, 0.12);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #2b6cb0, #1a365d);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
            letter-spacing: 0.3px;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 54, 93, 0.4);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-mensaje {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.88em;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .login-mensaje.error {
            display: block;
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        .login-mensaje.success {
            display: block;
            background: #f0fff4;
            color: #276749;
            border: 1px solid #9ae6b4;
        }

        .login-mensaje.info {
            display: block;
            background: #ebf8ff;
            color: #2b6cb0;
            border: 1px solid #90cdf4;
        }

        /* MFA Section */
        .mfa-section {
            display: none;
            text-align: center;
        }

        .mfa-section.visible { display: block; }

        .mfa-icon {
            font-size: 3em;
            margin-bottom: 12px;
        }

        .mfa-section h2 {
            color: #1a365d;
            font-size: 1.2em;
            margin-bottom: 6px;
        }

        .mfa-section p {
            color: #718096;
            font-size: 0.85em;
            margin-bottom: 20px;
        }

        .mfa-input {
            text-align: center;
            font-size: 1.8em !important;
            letter-spacing: 10px;
            font-weight: 700;
            padding: 16px !important;
        }

        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #a0aec0;
            font-size: 0.82em;
        }

        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .separator span { padding: 0 12px; }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 24px;
            color: #a0aec0;
            font-size: 0.78em;
        }

        .security-badge span { color: #48bb78; }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: transparent;
            border-top: none;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Paso 1: Login con credenciales -->
        <div id="loginSection">
            <div class="login-header">
                <div class="login-logo">💊</div>
                <h1>Farmacias Cruz Azul</h1>
                <p>Portal de Autenticación — ERP</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">👤 Usuario</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Ingrese su usuario" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">🔒 Contraseña</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Ingrese su contraseña" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btnLogin">
                    🔐 Iniciar Sesión
                </button>
            </form>

            <div id="loginMensaje" class="login-mensaje"></div>
        </div>

        <!-- Paso 2: Verificación MFA -->
        <div id="mfaSection" class="mfa-section">
            <div class="mfa-icon">🔐</div>
            <h2>Verificación en 2 Pasos</h2>
            <p>Ingrese el código de 6 dígitos desde su aplicación de autenticación</p>

            <form id="mfaForm" class="login-form">
                <div class="form-group">
                    <input type="text" id="codigoMfa" class="mfa-input" 
                           maxlength="6" pattern="[0-9]{6}" required
                           placeholder="000000" autocomplete="one-time-code"
                           inputmode="numeric">
                </div>
                <button type="submit" class="btn-login" id="btnMfa">
                    ✅ Verificar Código
                </button>
            </form>

            <div id="mfaMensaje" class="login-mensaje"></div>

            <div class="separator"><span>o</span></div>
            <button onclick="volverLogin()" style="background:none;border:none;color:#2b6cb0;cursor:pointer;font-family:inherit;font-size:0.88em;font-weight:600;">
                ← Volver al inicio de sesión
            </button>
        </div>

        <div class="security-badge">
            <span>🛡️</span> Conexión segura — Acceso controlado con MFA
        </div>
    </div>

    <footer>
        <p>ERP Farmacias Cruz Azul &copy; 2026 | Arquitectura Multi Cloud — INACAP</p>
    </footer>

    <script>
        let tempToken = null;

        // Verificar si ya hay un token válido
        const tokenExistente = localStorage.getItem('erp_token');
        if (tokenExistente) {
            // Verificar si el token es válido
            fetch('/api/auth/me', {
                headers: { 'Authorization': 'Bearer ' + tokenExistente }
            }).then(r => {
                if (r.ok) window.location.href = '/dashboard';
            }).catch(() => {});
        }

        // Paso 1: Login con credenciales
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.textContent = '⏳ Verificando...';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await resp.json();

                if (result.success) {
                    if (result.mfa_requerido) {
                        // Paso 2: MFA requerido
                        tempToken = result.temp_token;
                        document.getElementById('loginSection').style.display = 'none';
                        document.getElementById('mfaSection').classList.add('visible');
                        document.getElementById('codigoMfa').focus();
                        mostrarMensaje('loginMensaje', '', '');
                    } else {
                        // Login exitoso sin MFA
                        localStorage.setItem('erp_token', result.token);
                        localStorage.setItem('erp_usuario', JSON.stringify(result.usuario));
                        mostrarMensaje('loginMensaje', '✅ Acceso concedido. Redirigiendo...', 'success');
                        setTimeout(() => { window.location.href = '/dashboard'; }, 800);
                    }
                } else {
                    mostrarMensaje('loginMensaje', '❌ ' + result.error, 'error');
                }
            } catch (error) {
                mostrarMensaje('loginMensaje', '❌ Error de conexión con el servidor', 'error');
            }

            btn.disabled = false;
            btn.textContent = '🔐 Iniciar Sesión';
        });

        // Paso 2: Verificar código MFA
        document.getElementById('mfaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnMfa');
            btn.disabled = true;
            btn.textContent = '⏳ Verificando...';

            const codigo = document.getElementById('codigoMfa').value;

            try {
                const resp = await fetch('/api/auth/mfa/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ temp_token: tempToken, codigo_mfa: codigo })
                });

                const result = await resp.json();

                if (result.success) {
                    localStorage.setItem('erp_token', result.token);
                    localStorage.setItem('erp_usuario', JSON.stringify(result.usuario));
                    mostrarMensaje('mfaMensaje', '✅ MFA verificado. Redirigiendo...', 'success');
                    setTimeout(() => { window.location.href = '/dashboard'; }, 800);
                } else {
                    mostrarMensaje('mfaMensaje', '❌ ' + result.error, 'error');
                    document.getElementById('codigoMfa').value = '';
                    document.getElementById('codigoMfa').focus();
                }
            } catch (error) {
                mostrarMensaje('mfaMensaje', '❌ Error de conexión', 'error');
            }

            btn.disabled = false;
            btn.textContent = '✅ Verificar Código';
        });

        function volverLogin() {
            tempToken = null;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mfaSection').classList.remove('visible');
            document.getElementById('codigoMfa').value = '';
            document.getElementById('loginForm').reset();
        }

        function mostrarMensaje(elementId, texto, tipo) {
            const el = document.getElementById(elementId);
            if (!texto) { el.style.display = 'none'; return; }
            el.textContent = texto;
            el.className = 'login-mensaje ' + tipo;
        }
    </script>
</body>
</html>
