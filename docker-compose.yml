services:
  # ---- Base de Datos PostgreSQL ----
  # Ejecutar en instancia BD (44.213.157.157):
  #   docker compose up -d cruz-azul-bd
  cruz-azul-bd:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: cruz-azul-bd
    restart: always
    environment:
      POSTGRES_DB: cruz_azul_db
      POSTGRES_USER: cruz_azul_admin
      POSTGRES_PASSWORD: CruzAzul2026!
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - azul-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruz_azul_admin -d cruz_azul_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Frontend ERP (Node.js + Express) ----
  # Ejecutar en instancia Web (54.158.161.49):
  #   docker compose up -d cruz-azul-frontend
  cruz-azul-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cruz-azul-frontend
    restart: always
    environment:
      DB_HOST: 10.0.1.153
      DB_PORT: 5432
      DB_NAME: cruz_azul_db
      DB_USER: cruz_azul_admin
      DB_PASSWORD: CruzAzul2026!
      PORT: 80
    ports:
      - "80:80"
    networks:
      - azul-net

# ---- Red interna para comunicación entre instancias EC2 ----
networks:
  azul-net:
    driver: bridge

# ---- Volumen persistente para BD ----
volumes:
  pgdata:
    driver: local
